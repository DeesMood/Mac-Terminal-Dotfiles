# ==========================================
# Core Functionality & Key Bindings
# ==========================================

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# Copy selection to macOS clipboard (keyboard only)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Split panes using current directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Remove Neovim Esc key delay
set -sg escape-time 0

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# ==========================================
# UI & Theme (Matches Zsh & macOS Clear Dark)
# ==========================================

# Transparent background to match macOS terminal and Neovim
set -g status-style bg=default,fg="#a9b1d6"

# Window borders (Blue for active, dark grey for inactive)
set -g pane-active-border-style fg="#7aa2f7"
set -g pane-border-style fg="#292e42"

# Left status: Cyan (Matches your user@host zsh prompt)
set -g status-left "#[fg=#7dcfff,bold]  #S "
set -g status-left-length 30

# Right status: Yellow time, Blue date (Matches your Git/Path colors)
set -g status-right "#[fg=#e0af68,bold]%H:%M #[fg=#7aa2f7]%d-%b "

# Window status formatting
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W*"
setw -g window-status-format "#[fg=#565f89] #I:#W "

# ==========================================
# Plugins (TPM)
# ==========================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # A set of highly acceptable default settings

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatically restore last saved environment when tmux starts
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
